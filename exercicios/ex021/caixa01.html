<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Modelo de Cixas</title>
    <style>
      h1 {
        /*block-level*/
        background-color: lightgray;
        height: 300px;
        width: 300px;

        /*Modo completo:
        border-width: 10px;
        border-style: solid;
        border-color: darkslategray;*/

        /*Shorthand:*/
        border: 10px solid darkslategray;

        /*Modo completo:
        padding-top: 10px;
        padding-right: 20px;
        padding-bottom: 10px;
        padding-left: 20px;*/

        /*Shorthand:*/
        padding: 10px 20px;

        /*Modo completo:
        margin-top: 20px;
        margin-right: 20px;
        margin-bottom: 40px;
        margin-left: 20px;*/

        /*Shorthand:*/
        margin: 20px 20px 40px 20px;

        /*Modo completo:
        outline-width: 5px;
        outline-style: dashed;
        outline-color: salmon;*/

        /*Shorthand:*/
        outline: 5px dashed salmon;
      }

      a {
        /*inline-level*/
        border-width: 10px;
        border-style: solid;
        border-color: red;

        padding-top: 10px;
        padding-right: 10px;
        padding-bottom: 10px;
        padding-left: 10px;
      }
    </style>
  </head>
  <body>
    <h1>Exemplo de caixa box-level</h1>
    <p>
      Parágrafos também são exemplos de box-level, mas os
      <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como
      tudo isso funciona
    </p>
  </body>
</html>
