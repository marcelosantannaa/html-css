<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Botão Animado</title>

<style>
body {
  background-color: #111;
  display: flex;
  height: 100vh;
  justify-content: center;
  align-items: center;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  color: white;
  background-color: #0077ff;
  border: none;
  border-radius: 8px;
  cursor: pointer;

  /* Aqui entra a mágica */
  transition-duration: 0.3s;
}

/* Efeito ao passar o mouse */
button:hover {
  background-color: #00c3ff;
  transform: scale(1.1);
  box-shadow: 0 0 15px #00c3ff;
}
</style>
</head>

<body>
  <button>Clique aqui</button>
</body>
</html>
